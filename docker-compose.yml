# ══════════════════════════════════════════════════════════════════════════════
# Moviroo Analytics AI — Full Infrastructure
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: Moviroo_DB_V2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1878
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ── Kafka ───────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── MLflow ──────────────────────────────────────────────────────────────────
  # mlflow:
  #   image: ghcr.io/mlflow/mlflow:v2.11.0
  #   command: mlflow server --host 0.0.0.0 --port 5000
  #            --backend-store-uri postgresql://postgres:1878@postgres/Moviroo_DB_V2
  #            --default-artifact-root /mlflow/artifacts
  #   ports:
  #     - "5000:5000"
  #   volumes:
  #     - mlflow_artifacts:/mlflow/artifacts
  #   depends_on: [postgres]
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://postgres:1878@postgres:5432/Moviroo_DB_V2
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
  

  # ── ML Service ──────────────────────────────────────────────────────────────
  ml-service:
    build:
      context: .
      dockerfile: ml/Dockerfile.ml
    ports:
      - "8001:8001"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on: [mlflow, redis]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G

  # ── API Service ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:1878@postgres:5432/Moviroo_DB_V2
      REDIS_URL: redis://redis:6379/0
      ML_SERVICE_URL: http://ml-service:8001
    depends_on:
      postgres:   { condition: service_healthy }
      redis:      { condition: service_healthy }
      ml-service: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M

  # ── Airflow ─────────────────────────────────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.9.1
    command: webserver
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:1878@postgres/Moviroo_DB_V2
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    depends_on: [postgres]

  airflow-scheduler:
    image: apache/airflow:2.9.1
    command: scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:1878@postgres/Moviroo_DB_V2
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    depends_on: [postgres]

volumes:
  postgres_data:
  mlflow_artifacts: